name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    defaults:
      run:
        working-directory: MmdviewApp
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: アプリをビルドする
        run: swift build

      - name: テストを実行する
        run: swift test
