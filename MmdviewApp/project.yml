name: mmdview
options:
  bundleIdPrefix: com.degino
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  mmdview:
    type: application
    platform: macOS
    sources:
      - path: mmdview
        excludes:
          - "Resources/**"
          - Info.plist
          - mmdview.entitlements
      - path: mmdview/Resources
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.degino.mmdview
      PRODUCT_NAME: mmdview
      MARKETING_VERSION: "1.1.0"
      CURRENT_PROJECT_VERSION: "1"
      INFOPLIST_FILE: mmdview/Info.plist
      CODE_SIGN_ENTITLEMENTS: mmdview/mmdview.entitlements
      ENABLE_HARDENED_RUNTIME: true
      GENERATE_INFOPLIST_FILE: false
  mmdviewTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - mmdviewTests
    dependencies:
      - target: mmdview
    settings:
      BUNDLE_LOADER: "$(TEST_HOST)"
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/mmdview.app/Contents/MacOS/mmdview"
      GENERATE_INFOPLIST_FILE: true
