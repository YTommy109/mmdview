{% extends "base.html" %}
{% block content %}

<script type="text/hyperscript">
behavior ZoomController
  init
    set :zoom to js return parseFloat(localStorage.getItem('mmdview.viewer.zoom') || '1') || 1 end
    call applyZoom()
  end

  def applyZoom()
    if :zoom < 0.5 set :zoom to 0.5 end
    if :zoom > 2.0 set :zoom to 2.0 end
    js(zoom)
      document.getElementById('diagram-wrap').style.zoom = zoom;
      document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
      document.getElementById('zoom-in').disabled = zoom >= 2.0;
      document.getElementById('zoom-out').disabled = zoom <= 0.5;
      localStorage.setItem('mmdview.viewer.zoom', zoom);
    end with zoom = :zoom
  end

  on click
    if target is #zoom-in
      set :zoom to Math.round((:zoom + 0.25) * 100) / 100
      call applyZoom()
    else if target is #zoom-out
      set :zoom to Math.round((:zoom - 0.25) * 100) / 100
      call applyZoom()
    else if target is #zoom-label
      set :zoom to 1
      call applyZoom()
    end
  end

  on keydown[metaKey] from document
    if event.key is '-' or event.key is '=' or event.key is '+'
      halt the event
      if event.key is '-'
        set :zoom to Math.round((:zoom - 0.25) * 100) / 100
      else
        set :zoom to Math.round((:zoom + 0.25) * 100) / 100
      end
      call applyZoom()
    end
  end

  on wheel[ctrlKey] from document
    halt the event
    set :zoom to Math.round((:zoom - event.deltaY * 0.01) * 1000) / 1000
    call applyZoom()
  end
end
</script>

<div class="viewer">
  <div id="diagram-wrap">
    <pre class="mermaid">{{ content }}</pre>
  </div>
</div>

<div class="zoom-controls" _="install ZoomController">
  <button id="zoom-out" title="縮小 (Cmd −)">−</button>
  <span id="zoom-label" title="クリックでリセット">100%</span>
  <button id="zoom-in" title="拡大 (Cmd +)">+</button>
</div>

<div hx-ext="sse"
     sse-connect="/events?window_id={{ window_id }}"
     _="on sse:message
          if event.detail.data is 'reload'
            call location.reload()">
</div>

<script src="/static/js/mermaid.min.js"></script>
<script src="/static/js/htmx-ext-sse.js"></script>
<script>
mermaid.initialize({
  startOnLoad: true,
  theme: 'default',
  sequence: { useMaxWidth: false },
  er: { useMaxWidth: false },
  flowchart: { useMaxWidth: false },
  gantt: { useMaxWidth: false },
  journey: { useMaxWidth: false },
  pie: { useMaxWidth: false },
  state: { useMaxWidth: false },
  class: { useMaxWidth: false },
});
</script>
{% endblock %}
